name: Test

on:
  push:
    branches:
      - main
      - dev
      - feature-*
      - feature/**
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-tests:
    name: PHP ${{ matrix.php-version }} tests
    runs-on: ubuntu-latest
    env:
      CITYEVENTS_TEST_DB_HOST: 127.0.0.1
      CITYEVENTS_TEST_DB_PORT: 3306
      CITYEVENTS_TEST_DB_NAME: cityevents_admin_panel_test
      CITYEVENTS_TEST_DB_USER: root
      CITYEVENTS_TEST_DB_PASSWORD: root

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cityevents_admin_panel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.2"
          - "8.3"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: none
          extensions: pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHP test suite
        run: composer run-script test
